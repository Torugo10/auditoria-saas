[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "debug"

[browser]
gatherUsageStats = false

[server]
headless = true
port = 8501
address = "0.0.0.0"
enableXsrfProtection = false
enableCORS = true
maxUploadSize = 200

[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"
